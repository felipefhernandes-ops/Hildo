<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hildo Nascimento — Telescópios Artesanais</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void: #04080F;
  --deep: #07101C;
  --nebula: #0C1828;
  --dust: #131E30;
  --gold: #C9A84C;
  --gold-light: #E8C96A;
  --gold-dim: rgba(201,168,76,0.12);
  --star: #F0EDE8;
  --mist: #7A8FA8;
  --border: rgba(201,168,76,0.12);
}
html { scroll-behavior: smooth; }
body {
  background: var(--void);
  color: var(--star);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── STARS ── */
.stars-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  overflow: hidden;
}
.stars-bg canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

/* ── WA FLOAT (icon only) ── */
.wa-float {
  position: fixed; bottom: 2rem; right: 2rem; z-index: 998;
}
.wa-float-btn {
  display: flex; align-items: center; justify-content: center;
  width: 58px; height: 58px; border-radius: 50%;
  background: linear-gradient(135deg, #25D366, #1aaa50);
  border: none; cursor: pointer; text-decoration: none;
  box-shadow: 0 4px 20px rgba(37,211,102,0.4);
  animation: floatPulse 2.5s infinite;
  transition: transform 0.2s;
}
.wa-float-btn:hover { transform: scale(1.1); }
.wa-float-btn svg { width: 28px; height: 28px; fill: white; }
@keyframes floatPulse {
  0%,100% { box-shadow: 0 4px 20px rgba(37,211,102,0.4); }
  50% { box-shadow: 0 4px 40px rgba(37,211,102,0.7), 0 0 0 10px rgba(37,211,102,0.08); }
}
.wa-tip {
  position: absolute; right: 68px; bottom: 14px;
  background: var(--nebula); border: 1px solid var(--border);
  color: var(--star); font-family: 'DM Sans',sans-serif;
  font-size: 0.72rem; padding: 0.45rem 0.9rem;
  border-radius: 6px; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.wa-float:hover .wa-tip { opacity: 1; }
.wa-tip::after {
  content: ''; position: absolute; left: 100%; top: 50%;
  transform: translateY(-50%);
  border: 5px solid transparent; border-left-color: var(--nebula);
}

/* ── WA MODAL ── */
#waModal { display:none; position:fixed; inset:0; z-index:9999; align-items:center; justify-content:center; }
#waModal.open { display:flex; }
.wa-overlay { position:absolute; inset:0; background:rgba(4,8,15,0.88); backdrop-filter:blur(6px); }
.wa-box {
  position:relative; z-index:1;
  background: linear-gradient(140deg, var(--nebula), var(--dust));
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 20px; padding: 3rem 2.5rem;
  max-width: 440px; width: 92%; text-align: center;
  box-shadow: 0 0 80px rgba(201,168,76,0.1), 0 32px 80px rgba(4,8,15,0.8);
  animation: starPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes starPop {
  from { opacity:0; transform:scale(0.8) translateY(30px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}
.wa-close { position:absolute; top:1rem; right:1.2rem; background:none; border:none; cursor:pointer; color:var(--mist); font-size:1.3rem; transition:color 0.2s; }
.wa-close:hover { color:var(--gold); }
.wa-modal-icon {
  width:78px; height:78px; border-radius:50%;
  background: radial-gradient(circle, rgba(37,211,102,0.18) 0%, rgba(37,211,102,0.04) 100%);
  border: 1px solid rgba(37,211,102,0.3);
  display:flex; align-items:center; justify-content:center;
  margin: 0 auto 1.8rem;
  animation: glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100%{ box-shadow:0 0 20px rgba(37,211,102,0.2); }
  50%{ box-shadow:0 0 40px rgba(37,211,102,0.4), 0 0 80px rgba(37,211,102,0.1); }
}
.wa-modal-icon svg { width:38px; height:38px; fill:#25D366; }
.wa-box h3 { font-family:'Syne',sans-serif; font-size:1.7rem; font-weight:700; color:var(--star); margin-bottom:0.4rem; }
.wa-box .wa-name { font-size:0.78rem; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); margin-bottom:1rem; }
.wa-divider { width:50px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:1rem auto 1.2rem; }
.wa-desc { font-size:0.85rem; color:var(--mist); line-height:1.75; margin-bottom:2rem; }
.wa-cta-btn {
  display:flex; align-items:center; justify-content:center; gap:0.7rem;
  background:linear-gradient(135deg,#25D366,#1aaa50);
  color:white; text-decoration:none;
  padding:1rem 1.5rem; border-radius:50px;
  font-family:'DM Sans',sans-serif; font-size:0.8rem; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  box-shadow:0 8px 30px rgba(37,211,102,0.3);
  transition:transform 0.2s, box-shadow 0.2s; margin-bottom:1rem;
}
.wa-cta-btn:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(37,211,102,0.45); }
.wa-cta-btn svg { width:20px; height:20px; fill:white; }
.wa-phone { font-size:0.7rem; color:var(--mist); opacity:0.6; }

/* ── NAV ── */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:1rem 3.5rem;
  background:rgba(4,8,15,0.93); backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(201,168,76,0.08);
}
.nav-brand { display:flex; align-items:center; gap:1rem; text-decoration:none; }
.nav-brand-icon { width:36px; height:36px; }
.nav-brand-icon svg { width:100%; height:100%; }
.nav-brand-wrap {}
.nav-brand-name { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; color:var(--star); letter-spacing:0.03em; line-height:1.2; }
.nav-brand-sub { font-family:'DM Sans',sans-serif; font-size:0.56rem; font-weight:400; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); opacity:0.75; }
.nav-links { display:flex; gap:2.5rem; list-style:none; align-items:center; }
.nav-links a { font-family:'DM Sans',sans-serif; font-size:0.7rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--mist); text-decoration:none; transition:color 0.2s; }
.nav-links a:hover { color:var(--gold); }
.nav-cta { border:1px solid rgba(201,168,76,0.4) !important; color:var(--gold) !important; padding:0.5rem 1.3rem !important; border-radius:50px; transition:all 0.2s !important; }
.nav-cta:hover { background:var(--gold-dim) !important; border-color:var(--gold) !important; color:var(--gold-light) !important; }

/* ── HERO ── */
.hero {
  min-height:100vh; position:relative; z-index:1;
  display:grid; grid-template-columns:1fr 1fr;
  align-items:center; gap:4rem;
  padding:8rem 4rem 5rem;
  overflow:hidden;
}
.hero-glow { position:absolute; top:-20%; left:-10%; width:70vw; height:70vw; background:radial-gradient(ellipse,rgba(201,168,76,0.04) 0%,transparent 65%); pointer-events:none; }
.hero-glow-r { position:absolute; bottom:-30%; right:-10%; width:60vw; height:60vw; background:radial-gradient(ellipse,rgba(80,40,180,0.06) 0%,transparent 65%); pointer-events:none; }

.hero-eyebrow {
  display:inline-flex; align-items:center; gap:0.7rem;
  font-family:'DM Sans',sans-serif; font-size:0.65rem; font-weight:500;
  letter-spacing:0.26em; text-transform:uppercase; color:var(--gold); margin-bottom:1.8rem;
}
.hero-eyebrow::before { content:''; display:block; width:24px; height:1px; background:var(--gold); }

.hero-title {
  font-family:'Syne',sans-serif;
  font-size:clamp(2.6rem,5.2vw,4.8rem);
  font-weight:800; line-height:1.02;
  color:var(--star); letter-spacing:-0.02em; margin-bottom:1.5rem;
}
.hero-title em { font-style:italic; font-weight:300; color:var(--gold); font-family:'DM Sans',sans-serif; }

.hero-desc { font-family:'DM Sans',sans-serif; font-size:0.92rem; color:var(--mist); line-height:1.9; max-width:44ch; margin-bottom:2.5rem; }

.hero-actions { display:flex; gap:1rem; align-items:center; flex-wrap:wrap; }
.btn-gold {
  display:inline-flex; align-items:center; gap:0.6rem;
  padding:0.9rem 2.2rem;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 100%);
  color:var(--void); font-family:'DM Sans',sans-serif;
  font-size:0.72rem; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase;
  text-decoration:none; border-radius:50px;
  box-shadow:0 8px 30px rgba(201,168,76,0.3);
  transition:transform 0.2s, box-shadow 0.2s; border:none; cursor:pointer;
}
.btn-gold:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(201,168,76,0.45); }
.btn-outline {
  display:inline-flex; align-items:center; gap:0.5rem;
  padding:0.9rem 2rem; background:transparent;
  border:1px solid rgba(240,237,232,0.18); color:var(--star);
  font-family:'DM Sans',sans-serif; font-size:0.72rem; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase; text-decoration:none;
  border-radius:50px; transition:border-color 0.2s, background 0.2s;
}
.btn-outline:hover { border-color:rgba(240,237,232,0.45); background:rgba(240,237,232,0.05); }
.btn-outline::after { content:"↓"; margin-left:2px; }

.hero-visual { position:relative; }
.hero-img-wrap {
  position:relative; border-radius:16px; overflow:hidden;
  border:1px solid rgba(201,168,76,0.14);
  box-shadow:0 0 80px rgba(201,168,76,0.08), 0 40px 80px rgba(4,8,15,0.6);
}
.hero-img-wrap img { width:100%; display:block; }
.hero-badge {
  position:absolute; bottom:1.5rem; left:1.5rem; right:1.5rem;
  background:rgba(4,8,15,0.87); backdrop-filter:blur(10px);
  border:1px solid rgba(201,168,76,0.18); border-radius:10px; padding:1rem 1.2rem;
  display:flex; align-items:center; gap:1rem;
}
.badge-dot { width:7px; height:7px; border-radius:50%; background:var(--gold); flex-shrink:0; box-shadow:0 0 8px var(--gold); animation:pulse 2s infinite; }
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)}}
.badge-text { font-family:'DM Sans',sans-serif; font-size:0.78rem; color:var(--star); }
.badge-text strong { color:var(--gold); }

/* ── GOLD LINE ── */
.gold-line { position:relative; z-index:1; display:flex; align-items:center; gap:1.5rem; padding:0 4rem; }
.gold-line::before,.gold-line::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(201,168,76,0.25),transparent); }
.gold-star { color:var(--gold); font-size:0.9rem; opacity:0.5; }

/* ── SERVICES ── */
.services { position:relative; z-index:1; padding:6rem 4rem; }
.section-header { text-align:center; margin-bottom:4rem; }
.section-tag { font-family:'DM Sans',sans-serif; font-size:0.62rem; font-weight:500; letter-spacing:0.28em; text-transform:uppercase; color:var(--gold); margin-bottom:1rem; display:block; }
.section-title { font-family:'Syne',sans-serif; font-size:clamp(1.9rem,3.8vw,3rem); font-weight:700; color:var(--star); line-height:1.1; letter-spacing:-0.01em; }
.section-title em { font-style:italic; font-weight:300; color:var(--gold); font-family:'DM Sans',sans-serif; }

.services-grid { max-width:1200px; margin:0 auto; display:grid; grid-template-columns:repeat(4,1fr); gap:1.5rem; }

.service-card {
  background:linear-gradient(160deg,rgba(12,24,40,0.95),rgba(19,30,48,0.9));
  border:1px solid rgba(201,168,76,0.1); border-radius:14px; padding:2.2rem 1.8rem;
  position:relative; overflow:hidden;
  transition:border-color 0.3s, transform 0.3s, box-shadow 0.3s;
}
.service-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); opacity:0; transition:opacity 0.3s; }
.service-card:hover { border-color:rgba(201,168,76,0.28); transform:translateY(-6px); box-shadow:0 20px 60px rgba(4,8,15,0.5); }
.service-card:hover::before { opacity:1; }

/* SVG illustration area */
.service-illus {
  width:100%; height:130px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:1.5rem;
  position:relative;
}
.service-illus svg { max-width:100%; max-height:130px; overflow:visible; }

.service-name { font-family:'Syne',sans-serif; font-size:1.05rem; font-weight:700; color:var(--star); margin-bottom:0.6rem; letter-spacing:-0.01em; }
.service-desc { font-family:'DM Sans',sans-serif; font-size:0.81rem; color:var(--mist); line-height:1.8; }

/* ── GALLERY ── */
.gallery { position:relative; z-index:1; padding:4rem 4rem 6rem; }
.gallery-grid {
  max-width:1200px; margin:3rem auto 0;
  display:grid; grid-template-columns:repeat(12,1fr); gap:1rem;
}
.gal-item { overflow:hidden; border-radius:8px; cursor:pointer; border:1px solid rgba(201,168,76,0.07); position:relative; }
.gal-item img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.6s ease, filter 0.4s; filter:saturate(0.78) brightness(0.88); }
.gal-item:hover img { transform:scale(1.06); filter:saturate(1.1) brightness(1); }
.gal-overlay { position:absolute; inset:0; background:linear-gradient(transparent 50%,rgba(4,8,15,0.92)); opacity:0; transition:opacity 0.3s; display:flex; align-items:flex-end; padding:1.2rem; }
.gal-item:hover .gal-overlay { opacity:1; }
.gal-label { font-family:'DM Sans',sans-serif; font-size:0.68rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold); }
.g1{grid-column:1/6;grid-row:1;height:380px}
.g2{grid-column:6/9;grid-row:1;height:380px}
.g3{grid-column:9/13;grid-row:1;height:380px}
.g4{grid-column:1/4;grid-row:2;height:300px}
.g5{grid-column:4/8;grid-row:2;height:300px}
.g6{grid-column:8/10;grid-row:2;height:300px}
.g7{grid-column:10/13;grid-row:2;height:300px}
.g8{grid-column:1/5;grid-row:3;height:340px}
.g9{grid-column:5/9;grid-row:3;height:340px}
.g10{grid-column:9/13;grid-row:3;height:340px}

/* ── LUXE ── */
.luxe { position:relative; z-index:1; padding:7rem 4rem; }
.luxe-inner { max-width:1200px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:6rem; align-items:center; }
.luxe-img { position:relative; border-radius:12px; overflow:hidden; border:1px solid rgba(201,168,76,0.14); box-shadow:0 0 60px rgba(201,168,76,0.06),0 40px 80px rgba(4,8,15,0.5); }
.luxe-img img { width:100%; display:block; }
.luxe-badge { position:absolute; top:1.5rem; right:1.5rem; background:rgba(4,8,15,0.87); backdrop-filter:blur(8px); border:1px solid rgba(201,168,76,0.3); border-radius:8px; padding:0.8rem 1rem; text-align:center; }
.lb-num { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; color:var(--gold); line-height:1; }
.lb-txt { font-family:'DM Sans',sans-serif; font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--mist); margin-top:0.2rem; }
.luxe-content .section-tag { text-align:left; }
.luxe-content .section-title { text-align:left; margin-top:0.5rem; }
.luxe-text { font-family:'DM Sans',sans-serif; font-size:0.9rem; color:var(--mist); line-height:1.9; margin-top:1.5rem; }
.luxe-items { margin-top:2.5rem; display:flex; flex-direction:column; gap:1.2rem; }
.luxe-item { display:flex; align-items:flex-start; gap:1rem; }
.luxe-dot { width:18px; height:18px; border-radius:50%; flex-shrink:0; margin-top:3px; background:var(--gold-dim); border:1px solid rgba(201,168,76,0.35); display:flex; align-items:center; justify-content:center; }
.luxe-dot::after { content:''; width:5px; height:5px; border-radius:50%; background:var(--gold); }
.luxe-item-txt { font-family:'DM Sans',sans-serif; font-size:0.86rem; color:var(--mist); line-height:1.75; }
.luxe-item-txt strong { color:var(--star); font-weight:500; }

/* ── ABOUT ── */
.about { position:relative; z-index:1; padding:7rem 4rem; }
.about-inner { max-width:1200px; margin:0 auto; display:grid; grid-template-columns:1.2fr 1fr; gap:6rem; align-items:center; }
.about-quote {
  font-family:'DM Sans',sans-serif; font-style:italic;
  font-size:clamp(1.4rem,2.8vw,2.1rem); font-weight:300;
  color:var(--star); line-height:1.4;
  border-left:2px solid var(--gold); padding-left:2rem; margin-bottom:2rem;
}
.about-text { font-family:'DM Sans',sans-serif; font-size:0.9rem; color:var(--mist); line-height:1.9; margin-bottom:1rem; }
.about-text strong { color:var(--star); font-weight:500; }
.about-img { border-radius:12px; overflow:hidden; border:1px solid rgba(201,168,76,0.12); box-shadow:0 0 60px rgba(201,168,76,0.06); }
.about-img img { width:100%; display:block; }
.about-stats { display:flex; gap:2.5rem; margin-top:2.5rem; }
.stat-val { font-family:'Syne',sans-serif; font-size:2.3rem; font-weight:800; color:var(--gold); line-height:1; }
.stat-label { font-family:'DM Sans',sans-serif; font-size:0.62rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--mist); margin-top:0.3rem; }

/* ── ORCAMENTO ── */
.orcamento { position:relative; z-index:1; padding:8rem 4rem; text-align:center; }
.orc-glow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:600px; height:300px; background:radial-gradient(ellipse,rgba(201,168,76,0.06) 0%,transparent 70%); pointer-events:none; }
.orcamento-box {
  max-width:680px; margin:0 auto;
  background:linear-gradient(135deg,rgba(12,24,40,0.85),rgba(19,30,48,0.85));
  border:1px solid rgba(201,168,76,0.2); border-radius:20px; padding:4rem 3rem;
  box-shadow:0 0 80px rgba(201,168,76,0.05);
}
.orc-icon { font-size:2.2rem; margin-bottom:1.5rem; }
.orcamento-box h2 { font-family:'Syne',sans-serif; font-size:clamp(1.9rem,3.8vw,2.9rem); font-weight:700; color:var(--star); line-height:1.15; margin-bottom:1rem; letter-spacing:-0.01em; }
.orcamento-box h2 em { font-style:italic; font-weight:300; color:var(--gold); font-family:'DM Sans',sans-serif; }
.orc-text { font-family:'DM Sans',sans-serif; font-size:0.9rem; color:var(--mist); line-height:1.85; margin-bottom:2.5rem; }
.orc-channel {
  display:flex; align-items:center; gap:1rem;
  padding:1rem 1.5rem; margin-bottom:1.5rem;
  background:rgba(4,8,15,0.5); border:1px solid rgba(201,168,76,0.15);
  border-radius:10px; text-decoration:none; cursor:pointer;
  transition:border-color 0.2s, background 0.2s;
}
.orc-channel:hover { border-color:rgba(201,168,76,0.4); background:rgba(201,168,76,0.05); }
.orc-ch-icon { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:rgba(37,211,102,0.12); }
.orc-ch-icon svg { width:22px; height:22px; }
.orc-ch-label { font-family:'DM Sans',sans-serif; font-size:0.6rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--mist); text-align:left; }
.orc-ch-val { font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:500; color:var(--star); text-align:left; margin-top:0.1rem; }

/* ── FOOTER ── */
footer {
  position:relative; z-index:1;
  border-top:1px solid rgba(201,168,76,0.08); padding:2.5rem 4rem;
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(4,8,15,0.8);
}
.footer-brand { font-family:'Syne',sans-serif; font-size:0.88rem; font-weight:600; letter-spacing:0.04em; color:var(--gold); opacity:0.55; text-decoration:none; }
.footer-copy { font-family:'DM Sans',sans-serif; font-size:0.62rem; color:var(--mist); opacity:0.4; }

/* ── RESPONSIVE ── */
@media(max-width:960px){
  nav{padding:0.8rem 1.5rem}
  .nav-links{display:none}
  .hero{grid-template-columns:1fr;padding:7rem 1.5rem 4rem;gap:3rem}
  .services{padding:4rem 1.5rem}
  .services-grid{grid-template-columns:1fr 1fr}
  .gallery{padding:3rem 1.5rem 4rem}
  .gallery-grid{grid-template-columns:1fr 1fr}
  .g1,.g2,.g3,.g4,.g5,.g6,.g7,.g8,.g9,.g10{grid-column:auto;grid-row:auto;height:220px}
  .luxe{padding:4rem 1.5rem}
